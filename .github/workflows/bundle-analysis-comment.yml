name: Bundle Analysis (post comment)

# Triggered after bundle-analysis.yml completes. Runs in the BASE repo context
# (not the fork), so GITHUB_TOKEN has pull-requests: write access even for
# fork PRs. This is the standard safe pattern for posting PR comments from
# fork workflows.
on:
  workflow_run:
    workflows: ["Bundle Analysis"]
    types: [completed]

jobs:
  comment:
    name: Post size report
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion != 'cancelled'

    permissions:
      pull-requests: write
      actions: read

    steps:
      # Download the artifact uploaded by the analyze job.
      - name: Download PR artifacts
        uses: actions/download-artifact@v4
        with:
          name: bundle-analysis-pr-${{ github.event.workflow_run.pull_requests[0].number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let prNumber, commentBody;
            try {
              prNumber = parseInt(fs.readFileSync('pr_number.txt', 'utf8').trim(), 10);
              commentBody = fs.readFileSync('pr_comment_body.txt', 'utf8').trim();
            } catch {
              // Artifact missing (e.g. paths filter skipped the analyze job).
              console.log('No bundle analysis artifact found — skipping comment.');
              return;
            }

            if (!prNumber || isNaN(prNumber)) {
              console.log('Invalid PR number — skipping comment.');
              return;
            }

            const MARKER = '<!-- animateicons-bundle-analysis -->';
            const body = `${MARKER}\n${commentBody}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c =>
              c.user?.type === 'Bot' && c.body?.startsWith(MARKER)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log(`Updated comment #${existing.id} on PR #${prNumber}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              console.log(`Posted new comment on PR #${prNumber}`);
            }
