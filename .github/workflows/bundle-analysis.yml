name: Bundle Analysis

on:
  pull_request:
    branches: [main, dev]
    # Only run when the npm package or icons change — skip for docs-only PRs.
    paths:
      - "npm/**"
      - "icons/**"
      - ".github/workflows/bundle-analysis.yml"

# One analysis run per PR branch — cancel any in-progress run when a new
# commit is pushed so we never post a stale comment.
concurrency:
  group: bundle-analysis-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Measure bundle sizes
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Fork PRs get a read-only token — no write permissions needed here.
    permissions:
      contents: read

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: |
            pnpm-lock.yaml
            npm/pnpm-lock.yaml

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install npm package dependencies
        working-directory: npm
        run: pnpm install --frozen-lockfile

      # -----------------------------------------------------------------------
      # Build the npm package so dist/ exists for analysis.
      # -----------------------------------------------------------------------
      - name: Build npm package
        working-directory: npm
        run: pnpm build

      # -----------------------------------------------------------------------
      # Run the analysis script and capture output to a file.
      # We redirect GITHUB_OUTPUT to a temp file so we can read it back.
      # -----------------------------------------------------------------------
      - name: Analyze bundle sizes
        id: analyze
        working-directory: npm
        run: pnpm exec tsx scripts/analyze-bundle.ts --pr-comment
        # Don't fail the workflow here — budget failures are reported as a
        # comment. The hard gate is the existing `size` step in build-check.yml.

      # -----------------------------------------------------------------------
      # Save PR number + comment body as artifacts so the companion
      # `bundle-analysis-comment.yml` workflow (triggered via workflow_run
      # with write access) can post the comment without needing a write token
      # in the fork context.
      # -----------------------------------------------------------------------
      - name: Save PR number
        run: echo "${{ github.event.pull_request.number }}" > pr_number.txt

      - name: Extract comment body from GITHUB_OUTPUT
        run: |
          python3 - <<'EOF'
          import os, re

          output_file = os.environ.get("GITHUB_OUTPUT", "")
          if not output_file or not os.path.exists(output_file):
              with open("pr_comment_body.txt", "w") as f:
                  f.write("(bundle analysis output not available)")
              exit(0)

          with open(output_file, "r") as f:
              content = f.read()

          # Multiline output format: key<<DELIMITER\nvalue\nDELIMITER
          m = re.search(r"pr_comment_body<<(\S+)\n(.*?)\n\1", content, re.DOTALL)
          body = m.group(2) if m else "(no bundle report generated)"

          with open("pr_comment_body.txt", "w") as f:
              f.write(body)
          EOF

      - name: Upload PR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis-pr-${{ github.event.pull_request.number }}
          path: |
            pr_number.txt
            pr_comment_body.txt
          retention-days: 1

      # -----------------------------------------------------------------------
      # Upload size-history.json as an artifact so per-PR history is preserved
      # even if the file isn't committed back.
      # -----------------------------------------------------------------------
      - name: Upload size history artifact
        uses: actions/upload-artifact@v4
        with:
          name: size-history-${{ github.sha }}
          path: npm/scripts/size-history.json
          if-no-files-found: ignore
          retention-days: 90
